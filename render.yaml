services:
  - type: web
    name: uaft-qa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --workers/--threads matter as much as --timeout here. With the default
    # single sync worker, one slow model call blocks the whole app, Render's
    # health check times out after 5s, and Render restarts the instance
    # mid-request (surfacing as a 502). The work is pure I/O waiting on model
    # APIs, so threads are cheap. --timeout must also exceed REQUEST_TIMEOUT
    # (default 120s), or the worker is killed instead of falling back.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180 --graceful-timeout 30
    envVars:
      # Set secret values in the Render dashboard (do not commit them).
      # Standard engine (Gemma via Ollama Cloud) — at least this key is required.
      - key: OLLAMA_API_KEY
        sync: false
      # Comprehensive engine (OpenAI) — optional; enables auto-routing when set.
      - key: OPENAI_API_KEY
        sync: false
      # Optional overrides — defaults live in app.py.
      - key: OLLAMA_MODEL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: ROUTE_MODE
        sync: false
      - key: ROUTER_THRESHOLD
        sync: false
      - key: LLM_TIMEOUT
        sync: false
    healthCheckPath: /healthz
