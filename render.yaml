services:
  - type: web
    name: uaft-qa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout must exceed the app's REQUEST_TIMEOUT (120s) so a slow model
    # hits the app's own timeout + fallback instead of gunicorn killing the
    # worker (which returns an uncatchable 500). Default is only 30s.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --graceful-timeout 30
    envVars:
      # Set secret values in the Render dashboard (do not commit them).
      # Standard engine (Gemma via Ollama Cloud) — at least this key is required.
      - key: OLLAMA_API_KEY
        sync: false
      # Comprehensive engine (OpenAI) — optional; enables auto-routing when set.
      - key: OPENAI_API_KEY
        sync: false
      # Deep engine (Kimi K3 / Moonshot) — optional; top routing tier when set.
      - key: KIMI_API_KEY
        sync: false
      # Optional overrides — defaults live in app.py.
      - key: OLLAMA_MODEL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: KIMI_MODEL
        sync: false
      - key: KIMI_BASE_URL
        sync: false
      - key: ROUTE_MODE
        sync: false
      - key: ROUTER_THRESHOLD
        sync: false
      - key: ROUTER_DEEP_THRESHOLD
        sync: false
    healthCheckPath: /healthz
